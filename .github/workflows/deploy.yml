name: Deploy to Cloudflare Pages

# Deploys the built site + functions/ to Cloudflare Pages.
# Triggers:
#   - push to main            → deploy on every code change
#   - repository_dispatch     → Sanity webhook can trigger a content rebuild
#                               (POST to the GitHub dispatches API, type "sanity-publish")
#   - workflow_dispatch       → manual "Run workflow" button
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sanity-publish]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Non-secret project config (safe to keep here):
          PUBLIC_SANITY_PROJECT_ID: 2xo7pdy5
          PUBLIC_SANITY_DATASET: production
          PUBLIC_SANITY_API_VERSION: '2024-01-01'
          # Secret — set in GitHub repo settings → Secrets and variables → Actions:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 55935c9c90b48f1f1d018ea9b043f400
          command: pages deploy dist --project-name=nordicspeakers --branch=main
